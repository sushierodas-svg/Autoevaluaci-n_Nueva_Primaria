<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autoevaluación Escolaris</title>
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React y Babel para ejecutar el código directamente en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- html2canvas para la descarga de PNG -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-shadow { shadow-[0_10px_0_0_#ca8a04] }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // Componente de Icono Simple para reemplazar lucide-react en esta versión
        const Icon = ({ name, size = 24, className = "" }) => {
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [formData, setFormData] = useState({
                nombre: '',
                grado: 'Primaria',
                materia: 'Ciencias Naturales',
                leccion: '',
            });

            const [evaluacion, setEvaluacion] = useState({
                esfuerzo: { ley: false, viVideos: false, hiceTareas: false, fuiPuntual: false },
                comprension: 3,
            });

            const [showReport, setShowReport] = useState(false);
            const [isDownloading, setIsDownloading] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const reportRef = useRef(null);

            // Cargar iconos de Lucide después de cada renderizado
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            const materias = ["Ciencias Naturales", "Formación Ciudadana", "Comunicación y Lenguaje"];
            const grados = ["4° Primaria", "5° Primaria", "6° Primaria"];

            const toggleEsfuerzo = (key) => {
                setEvaluacion(prev => ({
                    ...prev,
                    esfuerzo: { ...prev.esfuerzo, [key]: !prev.esfuerzo[key] }
                }));
            };

            const generateReport = () => {
                if (!formData.nombre || !formData.leccion) {
                    setErrorMsg("¡Ups! Por favor escribe tu nombre y el nombre de la lección.");
                    setTimeout(() => setErrorMsg(""), 3000);
                    return;
                }
                setShowReport(true);
            };

            const downloadPNG = async () => {
                setIsDownloading(true);
                if (reportRef.current) {
                    const canvas = await html2canvas(reportRef.current, {
                        backgroundColor: '#ffffff',
                        scale: 2,
                        useCORS: true
                    });
                    const image = canvas.toDataURL("image/png");
                    const link = document.createElement('a');
                    link.href = image;
                    link.download = `Reporte_Escolaris_${formData.nombre.replace(/\s+/g, '_')}.png`;
                    link.click();
                }
                setIsDownloading(false);
            };

            return (
                <div className="min-h-screen bg-[#f0f9ff] text-slate-800 pb-20">
                    {/* Header */}
                    <header className="bg-[#1e3a45] text-white p-5 shadow-lg border-b-4 border-[#eab308]">
                        <div className="max-w-4xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-white p-2 rounded-2xl rotate-3">
                                    <Icon name="pen-tool" className="text-[#eab308]" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-black">ESCOLARIS</h1>
                                    <p className="text-[10px] uppercase tracking-widest text-yellow-400 font-bold">Educación para trascender</p>
                                </div>
                            </div>
                            <div className="hidden sm:flex items-center gap-2 bg-white/10 px-4 py-2 rounded-full">
                                <Icon name="sparkles" size={16} className="text-yellow-300" />
                                <span className="text-xs font-black uppercase">{formData.grado}</span>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto px-4 py-10">
                        <div className="text-center mb-12">
                            <h2 className="text-4xl md:text-5xl font-black text-[#1e3a45] mb-4">¿Cómo me fue hoy? 🎨</h2>
                            <p className="text-lg text-slate-500 font-medium">Completa tu autoevaluación y descarga tu insignia.</p>
                        </div>

                        {errorMsg && (
                            <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-rose-500 text-white px-6 py-3 rounded-full font-bold shadow-xl animate-bounce">
                                {errorMsg}
                            </div>
                        )}

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
                            {/* Datos */}
                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-blue-400">
                                <div className="mb-6">
                                    <label className="text-xs font-black text-blue-500 uppercase mb-3 block">Mi Nombre</label>
                                    <input type="text" placeholder="..." className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold" value={formData.nombre} onChange={e => setFormData({...formData, nombre: e.target.value})} />
                                </div>
                                <div>
                                    <label className="text-xs font-black text-blue-500 uppercase mb-3 block">Mi Grado</label>
                                    <select className="w-full p-4 bg-blue-50 border-2 border-blue-100 rounded-2xl font-bold" value={formData.grado} onChange={e => setFormData({...formData, grado: e.target.value})}>
                                        {grados.map(g => <option key={g} value={g}>{g}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="bg-white p-8 rounded-[2rem] shadow-xl border-t-8 border-amber-400">
                                <div className="mb-6">
                                    <label className="text-xs font-black text-amber-600 uppercase mb-3 block">Materia</label>
                                    <select className="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-bold" value={formData.materia} onChange={e => setFormData({...formData, materia: e.target.value})}>
                                        {materias.map(m => <option key={m} value={m}>{m}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="text-xs font-black text-amber-600 uppercase mb-3 block">Lección</label>
                                    <input type="text" placeholder="Ej. El Universo" className="w-full p-4 bg-amber-50 border-2 border-amber-100 rounded-2xl font-bold" value={formData.leccion} onChange={e => setFormData({...formData, leccion: e.target.value})} />
                                </div>
                            </div>
                        </div>

                        {/* Esfuerzo */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-10">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8">🚀 Mi Esfuerzo</h3>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                {[
                                    { id: 'ley', label: 'Leí contenido', icon: 'book-open', color: 'bg-emerald-500' },
                                    { id: 'viVideos', label: 'Vi videos', icon: 'video', color: 'bg-sky-500' },
                                    { id: 'hiceTareas', label: 'Hice tareas', icon: 'pen-tool', color: 'bg-indigo-500' },
                                    { id: 'fuiPuntual', label: 'Fui puntual', icon: 'clock', color: 'bg-rose-500' }
                                ].map(item => (
                                    <button key={item.id} onClick={() => toggleEsfuerzo(item.id)} className={`flex flex-col items-center p-6 rounded-[2rem] border-b-4 transition-all ${evaluacion.esfuerzo[item.id] ? `${item.color} text-white shadow-lg` : 'bg-slate-50 text-slate-300'}`}>
                                        <Icon name={item.icon} className="mb-3" />
                                        <span className="text-[10px] font-black uppercase text-center">{item.label}</span>
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Comprensión */}
                        <section className="bg-white p-10 rounded-[2.5rem] shadow-xl border-b-8 border-slate-100 mb-12 text-center">
                            <h3 className="text-2xl font-black text-[#1e3a45] mb-8">💡 ¿Cuánto aprendí?</h3>
                            <div className="flex justify-center gap-4 mb-6">
                                {[1, 2, 3, 4, 5].map(star => (
                                    <button key={star} onClick={() => setEvaluacion(prev => ({...prev, comprension: star}))} className={`transition-transform hover:scale-125 ${evaluacion.comprension >= star ? 'text-yellow-400' : 'text-slate-200'}`}>
                                        <Icon name="star" size={54} className={evaluacion.comprension >= star ? "fill-current" : ""} />
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* Botones */}
                        <div className="flex flex-col sm:flex-row gap-6 justify-center">
                            <button onClick={() => window.location.reload()} className="px-8 py-5 rounded-[1.5rem] border-4 border-slate-200 text-slate-400 font-black">REINICIAR</button>
                            <button onClick={generateReport} className="px-16 py-5 rounded-[1.5rem] bg-[#eab308] text-[#1e3a45] font-black text-xl shadow-[0_10px_0_0_#ca8a04] hover:-translate-y-1 transition-all">¡GENERAR REPORTE!</button>
                        </div>

                        {/* Modal Reporte */}
                        {showReport && (
                            <div className="fixed inset-0 bg-[#1e3a45]/95 backdrop-blur-xl z-50 flex flex-col items-center justify-center p-4 overflow-y-auto">
                                <div ref={reportRef} className="bg-white rounded-[2.5rem] max-w-lg w-full overflow-hidden shadow-2xl border-8 border-white mb-6">
                                    <div className="bg-[#1e3a45] p-8 text-center text-white">
                                        <Icon name="award" size={64} className="mx-auto text-yellow-400 mb-4" />
                                        <h4 className="text-2xl font-black">REPORTE DE ÉXITO</h4>
                                        <p className="text-yellow-400 text-[10px] font-black uppercase">ESCOLARIS • {formData.grado}</p>
                                    </div>
                                    <div className="p-8 space-y-4">
                                        <div className="bg-blue-50 p-4 rounded-xl flex justify-between font-black text-[#1e3a45]">
                                            <span className="text-blue-400 text-[10px] uppercase">Alumno</span>
                                            <span>{formData.nombre}</span>
                                        </div>
                                        <div className="bg-amber-50 p-4 rounded-xl text-center font-black text-[#1e3a45]">
                                            <p className="text-amber-600 text-[10px] uppercase mb-1">{formData.materia}</p>
                                            <p>"{formData.leccion}"</p>
                                        </div>
                                        <div className="bg-slate-50 p-4 rounded-xl flex flex-wrap gap-2 justify-center">
                                            {evaluacion.esfuerzo.ley && <span className="bg-emerald-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Lectura</span>}
                                            {evaluacion.esfuerzo.viVideos && <span className="bg-sky-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Videos</span>}
                                            {evaluacion.esfuerzo.hiceTareas && <span className="bg-indigo-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Tareas</span>}
                                            {evaluacion.esfuerzo.fuiPuntual && <span className="bg-rose-500 text-white px-2 py-1 rounded-full text-[8px] font-black uppercase">Puntual</span>}
                                        </div>
                                        <div className="text-center pt-4 border-t">
                                            <div className="flex justify-center gap-1 text-yellow-400 mb-1">
                                                {[...Array(evaluacion.comprension)].map((_, i) => <Icon key={i} name="star" size={24} className="fill-current" />)}
                                            </div>
                                            <p className="text-[10px] font-black uppercase text-slate-400">Logro: {evaluacion.comprension}/5</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="max-w-lg w-full space-y-4">
                                    <div className="bg-white/10 border border-white/20 p-6 rounded-[2rem] text-white">
                                        <h5 className="text-center font-black text-yellow-400 uppercase mb-4">¿Cómo compartir?</h5>
                                        <div className="space-y-3 text-xs font-bold">
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-5 h-5 rounded-full flex items-center justify-center font-black">1</div> Pulsa el botón verde de abajo.</div>
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-5 h-5 rounded-full flex items-center justify-center font-black">2</div> Busca la imagen en tus descargas.</div>
                                            <div className="flex items-center gap-3"><div className="bg-yellow-400 text-[#1e3a45] w-5 h-5 rounded-full flex items-center justify-center font-black">3</div> Súbela a la plataforma de tareas.</div>
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <button onClick={() => setShowReport(false)} className="flex-1 py-4 rounded-2xl border-2 border-white/20 text-white font-black uppercase">Regresar</button>
                                        <button onClick={downloadPNG} disabled={isDownloading} className="flex-[2] py-4 rounded-2xl bg-green-500 text-white font-black uppercase hover:bg-green-400 transition-all shadow-xl">
                                            {isDownloading ? "Cargando..." : "Descargar Reporte (PNG)"}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
